# --- Prefix Configuration ---
set -g prefix C-a
unbind C-b
bind-key a send-prefix

# --- Flicker & Rendering Optimization (The "Ubuntu Fixes") ---
set -s escape-time 0           # Fixes lag and redraw stutter
set -g status-interval 60      # Stop status bar updates from triggering flickers
set -g focus-events on         # Helps the CLI handle redraws when switching panes
setw -g aggressive-resize on   # Crucial for stable TUI dimensions
set -g history-limit 50000     # Buffer for long AI outputs

# --- Terminal & Shell ---
# Prefer the broadly compatible screen-256color for remote hosts with limited terminfo.
set-option -g default-terminal "screen-256color"
set -as terminal-features ',xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB'
set-option -g default-shell /bin/zsh

# --- Interface & UI ---
set -g set-titles on
set -g set-titles-string '#(whoami) :: #h'
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mouse on

# Disable the visual/audio bells that cause "flashing" on errors
set -g visual-bell off
set -g bell-action none
setw -g monitor-activity on
set -g visual-activity on
set-window-option -g automatic-rename on

# --- Key Bindings ---
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Vi mode
set -g mode-keys vi
set -g status-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Tell tmux every terminal can accept an OSC 52 clipboard write. Without this tmux
# only emits OSC 52 for terminals whose terminfo advertises the Ms capability, so a
# remote session whose $TERM lacks it (common over SSH) would silently set nothing.
set -as terminal-features ',*:clipboard'

# Let tmux drive the system clipboard with OSC 52 escape sequences. This is the
# load-bearing line for SSH: any copy that creates a tmux buffer is also sent to
# the *attached* terminal, which sets the clipboard on whatever machine you are
# actually sitting at -- no local display server required. It is also plugin-order
# independent (works regardless of when tmux-yank binds its own keys).
set -g set-clipboard on

# Pick the copy sink at runtime. Over SSH there is no usable local display server,
# so lean entirely on set-clipboard/OSC 52 (a wl-copy/xclip pipe would just target
# the remote host's clipboard, or fail). Locally, keep piping to the native
# clipboard tool as before -- set-clipboard still fires too, which is harmless.
run-shell -b '
if [ -n "$SSH_CONNECTION" ]; then
  tmux bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
  tmux bind-key -T copy-mode-vi Enter send -X copy-selection-and-cancel
elif command -v wl-copy >/dev/null 2>&1; then
  tmux bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
  tmux bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "wl-copy"
elif command -v xclip >/dev/null 2>&1; then
  tmux bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -in -selection clipboard"
  tmux bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "xclip -in -selection clipboard"
elif command -v xsel >/dev/null 2>&1; then
  tmux bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xsel --clipboard --input"
  tmux bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "xsel --clipboard --input"
else
  tmux bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
  tmux bind-key -T copy-mode-vi Enter send -X copy-selection-and-cancel
fi
'

# --- Mission control sidebar (hq) ---
# prefix + m summons the agent sidebar as a popup that floats over ANY window or
# session (popups are server-global, so it persists across your whole tmux).
# q or Esc dismisses it. The renderer paints in place, so it does not flicker.
bind-key m display-popup -w 72 -h 85% -T ' 📡 mission control ' -E '~/.dotfiles/bin/hq watch'

# Vim-style pane navigation
bind-key j select-pane -D
bind-key k select-pane -U
bind-key h select-pane -L
bind-key l select-pane -R

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'jimeh/tmux-themepack'

set -g @themepack 'powerline/default/green'

# Start TPM only if present, so a missing/broken plugin manager does not block tmux startup.
if-shell '[ -x ~/.tmux/plugins/tpm/tpm ]' 'run-shell ~/.tmux/plugins/tpm/tpm'

# --- Mission control "need you" badge ---
# Appended AFTER TPM has loaded the theme (run-shell above is synchronous), so it
# augments the theme's status line instead of being overwritten by it. hq badge
# prints "● N need you" or nothing; the Claude hook fires `tmux refresh-client -S`
# on change so it repaints immediately without a fast status-interval poll.
set -g status-left-length 80
set -ag status-left '#[fg=colour203,bold]#(~/.dotfiles/bin/hq badge)#[default] '
