# Core mise tools — installed by every non-link profile (core|dev|full).
#
# Profiles are expressed as mise config environments, not duplicated tool lists:
#   dev  → this file + config.dev.toml                    (`mise install --env dev`)
#   full → this file + config.dev.toml + config.full.toml (`mise install --env dev,full`)
# Add a tool to the appropriate file and the matching profile installs it — there
# is no separate list in hooks/os to keep in sync.
#
# Personal, machine-local tools belong in an untracked ~/.config/mise/config.local.toml
# (mise loads it automatically; it is gitignored so it never lands in the work profiles).
[tools]
starship = "1.25.1"
atuin = "18.16.1"
kubectl = "1.36.1"
vale = "3.14.2"
