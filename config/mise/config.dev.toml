# Dev profile tools — layered on config.toml via `mise install --env dev`.
[tools]
neovim = "0.12.2"
doctl = "1.159.0"
gh = "2.92.0"
"github:agavra/tuicr" = "v0.16.1"
kubectx = "0.11.0"
kubens = "0.11.0"
helm = "4.2.0"
kubebuilder = "4.14.0"
kind = "0.31.0"
ginkgo = "latest"
sonobuoy = "latest"
cilium-cli = "latest"
promtool = "3.12.0"
loki-logcli = "3.6.11"
teleport-community = "18.10.0"
"npm:playwright" = "latest"  # headless browser automation; driven against system google-chrome (channel: 'chrome')
"pipx:awscli" = "1.45.11"
"pipx:esptool" = "latest"
"pipx:black" = "latest"
"pipx:isort" = "latest"
"pipx:mypy" = "latest"
"pipx:python-openstackclient" = { version = "10.0.0", uvx_args = "--with python-octaviaclient==3.13.0" }
"pipx:ruff" = "latest"
