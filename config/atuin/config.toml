## Minimal Atuin config managed by dotfiles.

enter_accept = true
search_mode = "fuzzy"
filter_mode = "global"
style = "compact"
show_help = false
show_tabs = false
inline_height = 20
prefers_reduced_motion = true
history_filter = [
  "(?i)(--password|--passwd|--token|--secret)(=|[[:space:]])",
  "(?i)(aws_secret_access_key|aws_access_key_id|github_token|ghp_[A-Za-z0-9_]+)",
  "(?i)(authorization:[[:space:]]*bearer[[:space:]]+|api[_-]?key[=[:space:]])",
]

[search]
filters = ["workspace", "directory", "session", "host", "global"]

[theme]
name = "marine"

[ui]
columns = ["duration", "time", "command"]
