command_timeout = 1000
scan_timeout = 10

[kubernetes]
format = '[$symbol$context( \($namespace\))]($style) in '
disabled = false
[kubernetes.context_aliases]

[java]
disabled = true

[package]
disabled = true

[custom.mapi]
symbol = "🗺️"
command = """
endpoint="${MAPI_ENDPOINT:-}"
sub="${endpoint%%.*}"
env="${sub#*-}"
[ "${env}" = "${sub}" ] && env="${sub}"
[ "${env}" = "mapi" ] && env="prod"
domain="${endpoint#*.}"
[ "${domain}" = "${endpoint}" ] && domain=""
printf "%s %s" "${env}" "${domain}"
"""
when = """ [ -n "$MAPI_ENDPOINT" ] """
format = " [\\($symbol  $output\\) ]($style)"
